<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#6C63FF"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ArtLog"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>ArtLog 🎨</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f13;--bg-card:#17171f;--bg-el:#1e1e28;--border:#2a2a38;--border-s:#1e1e28;
  --text:#f0f0f5;--text2:#9898b0;--text3:#5a5a72;
  --accent:#6C63FF;--accent-d:rgba(108,99,255,.15);
  --green:#43D9AD;--green-d:rgba(67,217,173,.12);
  --red:#FF4F6A;--red-d:rgba(255,79,106,.12);
  --warn:#F59E0B;
  --r:14px;--rs:8px;--rl:20px;
}
[data-theme=light]{
  --bg:#f5f5fa;--bg-card:#fff;--bg-el:#eeeef7;--border:#e0e0ef;--border-s:#ebebf5;
  --text:#0f0f1a;--text2:#5a5a78;--text3:#9898b8;
  --accent:#5A52E8;--accent-d:rgba(90,82,232,.1);
  --green:#16a085;--green-d:rgba(22,160,133,.1);
  --red:#E03050;--red-d:rgba(224,48,80,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea,select{font-family:inherit}

/* LAYOUT */
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.page{flex:1;padding:0 16px 90px;overflow-x:hidden}
.page-header{padding:20px 0 12px;display:flex;align-items:center;gap:12px}
.page-title{font-size:22px;font-weight:700;flex:1}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-card);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;color:var(--text3);font-size:10px;font-weight:600;background:none;border:none;cursor:pointer;transition:color .15s}
.nav-btn.on{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:16px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:var(--rs);font-size:14px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg-el);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red-d);color:var(--red)}
.btn-full{width:100%}
.btn-sm{padding:7px 14px;font-size:13px}
.icon-btn{width:36px;height:36px;border-radius:var(--rs);background:var(--bg-el);color:var(--text2);display:inline-flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.icon-btn:active{background:var(--border);color:var(--text)}

/* FORM */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase}
.input{background:var(--bg-el);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;color:var(--text);font-size:15px;width:100%;transition:border-color .15s}
.input:focus{outline:none;border-color:var(--accent)}
.input::placeholder{color:var(--text3)}
textarea.input{resize:vertical;min-height:72px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px);animation:fi .15s ease}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rl);padding:24px;width:100%;max-width:448px;animation:su .2s ease}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* MISC */
.stack{display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:20px 0 10px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-accent{background:var(--accent-d);color:var(--accent)}
.badge-green{background:var(--green-d);color:var(--green)}
.badge-muted{background:var(--bg-el);color:var(--text3)}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-desc{font-size:13px;line-height:1.6}
.divider{height:1px;background:var(--border-s);margin:4px 0}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* TIMER */
.timer-big{font-size:56px;font-weight:700;letter-spacing:-2px;text-align:center;line-height:1;font-variant-numeric:tabular-nums}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:24px}
.t-btn{width:64px;height:64px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.t-btn:active{transform:scale(.92)}
.t-start{background:var(--accent);color:#fff;box-shadow:0 0 24px rgba(108,99,255,.4)}
.t-pause{background:var(--bg-el);border:1px solid var(--border);color:var(--text2)}
.t-stop{background:var(--red-d);color:var(--red)}
.t-reset{background:var(--bg-el);border:1px solid var(--border);color:var(--text2)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--accent) 0%,#9B59E8 100%);border-radius:var(--rl);padding:24px;color:#fff;margin-bottom:4px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%;top:-40px;right:-40px}
.hero-hours{font-size:48px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.hero-label{font-size:13px;opacity:.8;font-weight:500}

/* PROJECT CARD */
.proj-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;gap:12px;align-items:flex-start}
.proj-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.proj-name{font-size:15px;font-weight:600;line-height:1.3}
.proj-meta{font-size:12px;color:var(--text3);margin-top:3px}
.proj-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}

/* SESSION */
.sess{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-s)}
.sess:last-child{border-bottom:none}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sess-info{flex:1}
.sess-date{font-size:12px;color:var(--text3)}
.sess-time{font-size:13px;color:var(--text2)}
.sess-dur{font-size:14px;font-weight:700}

/* PROGRESS */
.prog-bar{height:4px;background:var(--bg-el);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* WEEKLY CHART */
.week-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding:0 4px}
.week-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.week-track{flex:1;width:100%;background:var(--bg-el);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.week-fill{width:100%;border-radius:4px;min-height:2px;transition:height .4s ease}
.week-lbl{font-size:10px;color:var(--text3);font-weight:500}

/* COLOR SWATCHES */
.swatches{display:flex;flex-wrap:wrap;gap:8px}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .15s}
.swatch:active{transform:scale(.88)}
.swatch.on{border-color:var(--text)}

/* TOAST */
.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:448px}
.toast{background:var(--bg-el);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:su .2s ease}

/* RUNNING PULSE */
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pl 1.5s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px}
.ftab{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer}
.ftab.on{background:var(--accent);color:#fff}
.ftab.off{background:var(--bg-el);color:var(--text2);border:none}

/* DROPDOWN */
.select-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg-el);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;cursor:pointer;transition:border-color .15s}
.select-btn:focus{outline:none;border-color:var(--accent)}
.dropdown{margin-top:6px;background:var(--bg-el);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.drop-item{width:100%;display:flex;align-items:center;gap:10px;padding:11px 14px;background:transparent;color:var(--text);border:none;border-bottom:1px solid var(--border-s);font-size:14px;cursor:pointer;text-align:left;transition:background .1s}
.drop-item:last-child{border-bottom:none}
.drop-item:active,.drop-item.on{background:var(--accent-d);color:var(--accent)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="page" id="page"></div>
  <nav class="nav">
    <button class="nav-btn on" data-tab="dashboard" onclick="goTab('dashboard')"><span class="nav-icon">🏠</span>Início</button>
    <button class="nav-btn" data-tab="projects" onclick="goTab('projects')"><span class="nav-icon">🗂️</span>Projetos</button>
    <button class="nav-btn" data-tab="timer" onclick="goTab('timer')"><span class="nav-icon">⏱️</span>Timer</button>
    <button class="nav-btn" data-tab="settings" onclick="goTab('settings')"><span class="nav-icon">⚙️</span>Config</button>
  </nav>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
// ─── STORAGE ────────────────────────────────────────────
const KEY = 'artlog_v1';
let DB = JSON.parse(localStorage.getItem(KEY) || '{"projects":[],"sessions":[]}');
const save = () => localStorage.setItem(KEY, JSON.stringify(DB));

// ─── THEME ──────────────────────────────────────────────
let theme = localStorage.getItem('artlog_theme') ||
  (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', theme);
const toggleTheme = () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('artlog_theme', theme);
  render();
};

// ─── TOAST ──────────────────────────────────────────────
const toast = (msg, type='info') => {
  const icons = {success:'✅',error:'❌',info:'💡'};
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icons[type]}</span>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
};

// ─── FORMAT ─────────────────────────────────────────────
const fDur = ms => {
  if (!ms || ms < 0) return '0m';
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0) return `${m}m ${String(sec).padStart(2,'0')}s`;
  return `${sec}s`;
};
const fDurLong = ms => {
  if (!ms) return '0h';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  if (h > 0 && m > 0) return `${h}h ${m}min`;
  if (h > 0) return `${h}h`;
  return `${m}min`;
};
const fTime = d => d ? new Date(d).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '--:--';
const fDate = d => d ? new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '';
const fDateShort = d => d ? new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '';
const toDateStr = d => { const x = new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; };

const COLORS = ['#6C63FF','#FF6584','#43D9AD','#F59E0B','#3B82F6','#EC4899','#10B981','#8B5CF6','#F97316','#06B6D4'];

// ─── STATS ──────────────────────────────────────────────
const projStats = id => {
  const sessions = DB.sessions.filter(s => s.projectId === id);
  const totalMs = sessions.reduce((a,s) => a+s.durationMs, 0);
  const days = new Set(sessions.map(s => s.date)).size;
  return { sessions, totalMs, days, count: sessions.length, avgMs: sessions.length ? totalMs/sessions.length : 0 };
};
const globalStats = () => ({
  totalMs: DB.sessions.reduce((a,s) => a+s.durationMs, 0),
  active: DB.projects.filter(p => !p.completed).length,
  completed: DB.projects.filter(p => p.completed).length,
  recent: [...DB.sessions].sort((a,b) => new Date(b.startedAt)-new Date(a.startedAt)).slice(0,5),
});

// ─── ROUTER ─────────────────────────────────────────────
let currentTab = 'dashboard';
let openProjectId = null;
let projectFilter = 'all';

const goTab = tab => {
  currentTab = tab;
  openProjectId = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  render();
};
const openProject = id => { openProjectId = id; render(); };
const goBack = () => { openProjectId = null; render(); };

// ─── TIMER STATE ────────────────────────────────────────
let timerState = 'idle'; // idle | running | paused
let timerStart = null;
let timerAccMs = 0;
let timerLapStart = null;
let timerInterval = null;
let timerProjectId = '';
let timerNote = '';
let timerDropOpen = false;

const timerElapsed = () => {
  if (timerState === 'running') return timerAccMs + (Date.now() - timerLapStart);
  return timerAccMs;
};
const msToDisplay = ms => {
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
};

const timerStart_ = () => {
  if (timerState === 'idle') { timerStart = new Date(); timerAccMs = 0; }
  timerLapStart = Date.now();
  timerState = 'running';
  timerInterval = setInterval(() => {
    const el = document.getElementById('timer-display');
    if (el) el.textContent = msToDisplay(timerElapsed());
  }, 500);
  render();
};
const timerPause_ = () => {
  timerAccMs += Date.now() - timerLapStart;
  clearInterval(timerInterval);
  timerState = 'paused';
  render();
};
const timerReset_ = () => {
  const ms = timerElapsed();
  if (ms > 5000 && !confirm('Descartar sessão atual?')) return;
  clearInterval(timerInterval);
  timerState = 'idle'; timerAccMs = 0; timerLapStart = null; timerStart = null;
  render();
};
const timerStop_ = () => {
  if (!timerProjectId) { toast('Selecione um projeto primeiro','error'); return; }
  if (timerState === 'running') timerAccMs += Date.now() - timerLapStart;
  const finalMs = timerAccMs;
  const startedAt = timerStart;
  const endedAt = new Date();
  if (finalMs < 5000) { toast('Sessão muito curta (mínimo 5s)','error'); return; }
  clearInterval(timerInterval);
  DB.sessions.unshift({ id: Date.now().toString(), projectId: timerProjectId, startedAt: startedAt.toISOString(), endedAt: endedAt.toISOString(), durationMs: finalMs, date: toDateStr(startedAt), note: timerNote });
  save();
  toast(`Sessão registrada — ${fDur(finalMs)} 🎉`, 'success');
  timerState = 'idle'; timerAccMs = 0; timerLapStart = null; timerStart = null; timerNote = '';
  render();
};

// ─── RENDER ─────────────────────────────────────────────
const render = () => {
  const page = document.getElementById('page');
  if (openProjectId) { page.innerHTML = renderDetail(); return; }
  switch(currentTab) {
    case 'dashboard': page.innerHTML = renderDashboard(); break;
    case 'projects':  page.innerHTML = renderProjects(); break;
    case 'timer':     page.innerHTML = renderTimer(); break;
    case 'settings':  page.innerHTML = renderSettings(); break;
  }
};

// ─── DASHBOARD ──────────────────────────────────────────
const renderDashboard = () => {
  const s = globalStats();
  const recent = s.recent.map(sess => ({ ...sess, proj: DB.projects.find(p => p.id === sess.projectId) }));

  const days = ['D','S','T','Q','Q','S','S'];
  const today = new Date();
  const bars = Array.from({length:7}, (_,i) => {
    const d = new Date(today); d.setDate(today.getDate()-(6-i));
    const ds = toDateStr(d);
    const ms = DB.sessions.filter(s => s.date===ds).reduce((a,s) => a+s.durationMs, 0);
    return { lbl: days[d.getDay()], ms, today: i===6 };
  });
  const maxMs = Math.max(...bars.map(b => b.ms), 1);

  return `
  <div class="page-header">
    <span style="font-size:22px">🎨</span>
    <h1 class="page-title">ArtLog</h1>
    <button class="icon-btn" onclick="toggleTheme()" title="Tema">${theme==='dark'?'☀️':'🌙'}</button>
  </div>

  <div class="hero" style="margin-bottom:16px">
    <div class="hero-label">Total de horas praticadas</div>
    <div class="hero-hours">${fDurLong(s.totalMs)}</div>
    <div style="margin-top:10px;font-size:12px;opacity:.7">${DB.sessions.length} sessão${DB.sessions.length!==1?'ões':''} registrada${DB.sessions.length!==1?'s':''}</div>
  </div>

  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card" style="cursor:pointer" onclick="goTab('projects')">
      <div class="stat-label">Projetos ativos</div>
      <div class="stat-value" style="color:var(--accent)">${s.active}</div>
      <div class="stat-sub">em andamento</div>
    </div>
    <div class="stat-card" style="cursor:pointer" onclick="goTab('projects')">
      <div class="stat-label">Concluídos</div>
      <div class="stat-value" style="color:var(--green)">${s.completed}</div>
      <div class="stat-sub">finalizados</div>
    </div>
  </div>

  ${DB.sessions.length > 0 ? `
  <div class="card" style="margin-bottom:16px">
    <div class="section-label" style="margin-top:0">Últimos 7 dias</div>
    <div class="week-chart">
      ${bars.map(b => `
      <div class="week-col">
        <div class="week-track">
          <div class="week-fill" style="height:${Math.max((b.ms/maxMs)*100, b.ms>0?4:0)}%;background:${b.today?'var(--accent)':'var(--text3)'};opacity:${b.today?1:.5}"></div>
        </div>
        <span class="week-lbl" style="color:${b.today?'var(--accent)':''}">${b.lbl}</span>
      </div>`).join('')}
    </div>
  </div>` : ''}

  <div class="section-label">Últimas sessões</div>
  ${recent.length === 0 ? `
  <div class="empty">
    <div class="empty-icon">🖌️</div>
    <div class="empty-title">Nenhuma sessão ainda</div>
    <div class="empty-desc">Crie um projeto e inicie o cronômetro para começar.</div>
    <button class="btn btn-primary" style="margin-top:16px" onclick="goTab('projects')">Criar projeto</button>
  </div>` : `
  <div class="card">
    ${recent.map(s => `
    <div class="sess">
      <div class="sess-dot" style="background:${s.proj?.color||'var(--accent)'}"></div>
      <div class="sess-info">
        <div class="sess-date">${s.proj?.name||'Projeto removido'} · ${fDate(s.startedAt)}</div>
        <div class="sess-time">${fTime(s.startedAt)} → ${fTime(s.endedAt)}</div>
      </div>
      <div class="sess-dur">${fDur(s.durationMs)}</div>
    </div>`).join('')}
  </div>`}`;
};

// ─── PROJECTS ───────────────────────────────────────────
const renderProjects = () => {
  const filtered = DB.projects.filter(p =>
    projectFilter==='all' ? true : projectFilter==='active' ? !p.completed : p.completed
  );
  return `
  <div class="page-header">
    <h1 class="page-title">Projetos</h1>
    <button class="btn btn-primary btn-sm" onclick="showProjectForm()">＋ Novo</button>
  </div>
  <div class="filter-tabs">
    ${[['all','Todos'],['active','Ativos'],['completed','Concluídos']].map(([v,l]) =>
      `<button class="ftab ${projectFilter===v?'on':'off'}" onclick="setFilter('${v}')">${l}</button>`
    ).join('')}
  </div>
  ${filtered.length===0 ? `
  <div class="empty">
    <div class="empty-icon">🖼️</div>
    <div class="empty-title">${projectFilter==='completed'?'Nenhum projeto concluído':'Nenhum projeto ainda'}</div>
    ${projectFilter==='all'?`<button class="btn btn-primary" style="margin-top:16px" onclick="showProjectForm()">Criar projeto</button>`:''}
  </div>` : `
  <div class="stack">
    ${filtered.map(p => {
      const st = projStats(p.id);
      return `
      <div class="proj-card">
        <div class="proj-bar" style="background:${p.color}"></div>
        <div style="flex:1;cursor:pointer" onclick="openProject('${p.id}')">
          <div class="between">
            <div class="proj-name" style="${p.completed?'opacity:.5;text-decoration:line-through':''}">${p.name}</div>
            <span style="color:var(--text3);font-size:16px">›</span>
          </div>
          ${p.description?`<div class="proj-meta">${p.description}</div>`:''}
          <div class="row" style="margin-top:8px;gap:12px">
            <span style="font-size:12px;color:var(--text3)">⏱ ${fDur(st.totalMs)}</span>
            <span style="font-size:12px;color:var(--text3)">${st.count} sessão${st.count!==1?'ões':''}</span>
            <span style="font-size:12px;color:var(--text3)">${fDateShort(p.createdAt)}</span>
          </div>
          ${p.completed?`<div class="badge badge-green" style="margin-top:8px">✓ Concluído</div>`:''}
        </div>
        <div class="proj-actions">
          <button class="icon-btn" title="${p.completed?'Reabrir':'Concluir'}" onclick="toggleProj('${p.id}')">${p.completed?'🔄':'✅'}</button>
          <button class="icon-btn" title="Editar" onclick="showProjectForm('${p.id}')">✏️</button>
          <button class="icon-btn" style="color:var(--red)" title="Excluir" onclick="delProj('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>`;
    }).join('')}
  </div>`}`;
};

// ─── TIMER PAGE ─────────────────────────────────────────
const renderTimer = () => {
  const active = DB.projects.filter(p => !p.completed);
  const selProj = DB.projects.find(p => p.id === timerProjectId);
  const elapsed = timerElapsed();
  return `
  <div class="page-header"><h1 class="page-title">Cronômetro</h1></div>

  <div class="card" style="margin-bottom:16px">
    <div class="section-label" style="margin-top:0">Projeto</div>
    ${active.length===0 ? `<p style="font-size:13px;color:var(--text3)">Nenhum projeto ativo. <button onclick="goTab('projects')" style="color:var(--accent);font-weight:600;font-size:13px">Criar um →</button></p>` : `
    <button class="select-btn" onclick="toggleDrop()" ${timerState!=='idle'?'disabled':''}>
      <span class="row" style="gap:10px">
        ${selProj?`<div class="dot" style="background:${selProj.color}"></div>`:''}
        <span style="color:${selProj?'var(--text)':'var(--text3)'}">${selProj?.name||'Selecionar projeto...'}</span>
      </span>
      <span>▾</span>
    </button>
    ${timerDropOpen?`<div class="dropdown">${active.map(p=>`
      <button class="drop-item${p.id===timerProjectId?' on':''}" onclick="selectProj('${p.id}')">
        <div class="dot" style="background:${p.color}"></div>${p.name}
      </button>`).join('')}</div>`:''}
    `}
  </div>

  <div class="card" style="padding:32px 24px;margin-bottom:16px;text-align:center">
    <div class="timer-big" id="timer-display">${msToDisplay(elapsed)}</div>
    <div style="margin:10px 0 0;min-height:24px">
      ${timerState==='running'?`<span class="row" style="justify-content:center;gap:6px"><div class="pulse"></div><span style="font-size:12px;color:var(--green);font-weight:600">Em andamento</span></span>`:''}
      ${timerState==='paused'?`<span style="font-size:12px;color:var(--warn);font-weight:600">⏸ Pausado</span>`:''}
      ${timerState==='idle'?`<span style="font-size:12px;color:var(--text3)">Pronto para iniciar</span>`:''}
    </div>
    <div class="timer-controls">
      ${timerState==='idle' ? `
        <button class="t-btn t-start" onclick="timerStart_()">▶</button>` : `
        <button class="t-btn t-reset" onclick="timerReset_()">↺</button>
        ${timerState==='running'
          ? `<button class="t-btn t-start" onclick="timerPause_()">⏸</button>`
          : `<button class="t-btn t-start" onclick="timerStart_()">▶</button>`}
        <button class="t-btn t-stop" onclick="timerStop_()" ${elapsed<5000?'disabled style="opacity:.4"':''}>■</button>`}
    </div>
    ${timerState!=='idle'&&elapsed<5000?`<p style="font-size:11px;color:var(--text3);margin-top:10px">Mínimo de 5s para registrar</p>`:''}
  </div>

  ${timerState!=='idle'?`
  <div class="card">
    <div class="field">
      <label>Nota da sessão (opcional)</label>
      <textarea class="input" rows="2" placeholder="O que você praticou?" onchange="timerNote=this.value">${timerNote}</textarea>
    </div>
  </div>`:`
  <div style="padding:16px;background:var(--accent-d);border-radius:var(--r);border:1px solid rgba(108,99,255,.2)">
    <div style="font-size:13px;color:var(--accent);font-weight:600;margin-bottom:6px">💡 Dica</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6">Selecione um projeto e inicie o cronômetro. Você pode pausar e retomar quando quiser.</div>
  </div>`}`;
};

// ─── PROJECT DETAIL ─────────────────────────────────────
const renderDetail = () => {
  const p = DB.projects.find(x => x.id===openProjectId);
  if (!p) return `<div class="page-header"><button class="icon-btn" onclick="goBack()">←</button><h1 class="page-title">Não encontrado</h1></div>`;
  const st = projStats(p.id);
  const sessions = [...st.sessions].sort((a,b) => new Date(b.startedAt)-new Date(a.startedAt));
  const goalMs = 10*3600*1000;
  const pct = Math.min(Math.round((st.totalMs/goalMs)*100), 100);
  return `
  <div class="page-header">
    <button class="icon-btn" onclick="goBack()">←</button>
    <div style="flex:1">
      <h1 class="page-title" style="font-size:18px">${p.name}</h1>
      ${p.description?`<p style="font-size:12px;color:var(--text3);margin-top:2px">${p.description}</p>`:''}
    </div>
    <div class="dot" style="background:${p.color}"></div>
  </div>

  <div class="row" style="margin-bottom:16px;gap:10px">
    ${p.completed?`<div class="badge badge-green">✓ Concluído</div>`:`<div class="badge badge-accent">● Em andamento</div>`}
    <span style="font-size:12px;color:var(--text3)">Criado em ${fDate(p.createdAt)}</span>
  </div>

  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-label">Tempo total</div><div class="stat-value" style="color:${p.color};font-size:18px">${fDurLong(st.totalMs)}</div></div>
    <div class="stat-card"><div class="stat-label">Sessões</div><div class="stat-value">${st.count}</div></div>
    <div class="stat-card"><div class="stat-label">Dias ativos</div><div class="stat-value">${st.days}</div></div>
    <div class="stat-card"><div class="stat-label">Média/sessão</div><div class="stat-value" style="font-size:18px">${fDurLong(st.avgMs)}</div></div>
  </div>

  ${st.totalMs>0?`
  <div class="card" style="margin-bottom:16px">
    <div class="between" style="margin-bottom:8px">
      <span style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em">Meta: 10 horas</span>
      <span style="font-size:12px;color:var(--text2)">${pct}%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${p.color}"></div></div>
    <div style="font-size:11px;color:var(--text3);margin-top:6px">${fDurLong(st.totalMs)} de 10h</div>
  </div>`:''}

  <div class="section-label">Histórico de sessões</div>
  ${sessions.length===0?`
  <div class="empty" style="padding:32px 0">
    <div class="empty-icon">⏱️</div>
    <div class="empty-title">Sem sessões ainda</div>
    <div class="empty-desc">Use o cronômetro para registrar sua primeira sessão.</div>
  </div>`:`
  <div class="card">
    ${sessions.map(s=>`
    <div class="sess">
      <div class="sess-dot" style="background:${p.color}"></div>
      <div class="sess-info">
        <div class="sess-date">${fDate(s.startedAt)}</div>
        <div class="sess-time">${fTime(s.startedAt)} → ${fTime(s.endedAt)}</div>
        ${s.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${s.note}</div>`:''}
      </div>
      <div class="row" style="gap:8px">
        <div class="sess-dur">${fDur(s.durationMs)}</div>
        <button class="icon-btn" style="width:28px;height:28px;font-size:13px;color:var(--red)" onclick="delSession('${s.id}')">🗑</button>
      </div>
    </div>`).join('')}
  </div>`}`;
};

// ─── SETTINGS ───────────────────────────────────────────
const renderSettings = () => {
  const s = globalStats();
  const top = [...DB.projects]
    .map(p => ({...p, totalMs: DB.sessions.filter(s=>s.projectId===p.id).reduce((a,s)=>a+s.durationMs,0)}))
    .sort((a,b)=>b.totalMs-a.totalMs).slice(0,5);
  const maxMs = top[0]?.totalMs || 1;
  return `
  <div class="page-header">
    <h1 class="page-title">Configurações</h1>
    <button class="icon-btn" onclick="toggleTheme()" title="Tema">${theme==='dark'?'☀️':'🌙'}</button>
  </div>

  <div class="section-label">Resumo geral</div>
  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-label">Total de horas</div><div class="stat-value" style="color:var(--accent);font-size:20px">${fDurLong(s.totalMs)}</div></div>
    <div class="stat-card"><div class="stat-label">Sessões</div><div class="stat-value" style="font-size:20px">${DB.sessions.length}</div></div>
    <div class="stat-card"><div class="stat-label">Ativos</div><div class="stat-value" style="font-size:20px">${s.active}</div></div>
    <div class="stat-card"><div class="stat-label">Concluídos</div><div class="stat-value" style="font-size:20px;color:var(--green)">${s.completed}</div></div>
  </div>

  ${top.length>0?`
  <div class="section-label">Projetos por horas</div>
  <div class="card" style="margin-bottom:16px">
    ${top.map((p,i)=>`
    <div style="${i<top.length-1?'margin-bottom:14px':''}">
      <div class="between" style="margin-bottom:5px">
        <div class="row"><div class="dot" style="background:${p.color}"></div><span style="font-size:13px;font-weight:500">${p.name}</span></div>
        <span style="font-size:12px;color:var(--text3);font-weight:600">${fDurLong(p.totalMs)}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${(p.totalMs/maxMs)*100}%;background:${p.color}"></div></div>
    </div>`).join('')}
  </div>`:''}

  <div class="section-label">Backup</div>
  <div class="card" style="margin-bottom:16px">
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">Exporte seus dados para um arquivo JSON ou importe um backup anterior.</p>
    <div class="stack">
      <button class="btn btn-primary btn-full" onclick="exportData()">⬇ Exportar dados (JSON)</button>
      <button class="btn btn-secondary btn-full" onclick="document.getElementById('imp').click()">⬆ Importar backup</button>
      <input id="imp" type="file" accept=".json" style="display:none" onchange="importData(this)"/>
    </div>
  </div>

  <div class="section-label">Sobre</div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">ArtLog v1.0</div>
    <div style="font-size:13px;color:var(--text3);line-height:1.6">Diário de produção artística. Todos os dados ficam salvos localmente no seu dispositivo.</div>
    <div style="margin-top:12px;padding:10px;background:var(--bg-el);border-radius:var(--rs)">
      <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">PWA — Funciona offline</div>
      <div style="font-size:12px;color:var(--text2)">Instale como app: Chrome → menu → "Adicionar à tela inicial"</div>
    </div>
  </div>`;
};

// ─── ACTIONS ────────────────────────────────────────────
const setFilter = f => { projectFilter = f; render(); };
const toggleDrop = () => { timerDropOpen = !timerDropOpen; render(); };
const selectProj = id => { timerProjectId = id; timerDropOpen = false; render(); };

const toggleProj = id => {
  const p = DB.projects.find(x=>x.id===id);
  p.completed = !p.completed;
  p.completedAt = p.completed ? new Date().toISOString() : null;
  save(); toast(p.completed?'Projeto concluído! 🎉':'Projeto reaberto','success'); render();
};

const delProj = (id, name) => {
  if (!confirm(`Excluir "${name}"? As sessões também serão removidas.`)) return;
  DB.projects = DB.projects.filter(p=>p.id!==id);
  DB.sessions = DB.sessions.filter(s=>s.projectId!==id);
  save(); toast('Projeto excluído','info'); render();
};

const delSession = id => {
  if (!confirm('Excluir esta sessão?')) return;
  DB.sessions = DB.sessions.filter(s=>s.id!==id);
  save(); toast('Sessão removida','info'); render();
};

// ─── PROJECT FORM ────────────────────────────────────────
let formEditId = null;
const showProjectForm = (id=null) => {
  formEditId = id;
  const p = id ? DB.projects.find(x=>x.id===id) : null;
  const color = p?.color || COLORS[0];
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'proj-modal';
  overlay.innerHTML = `
  <div class="modal">
    <div class="between" style="margin-bottom:20px">
      <div class="modal-title" style="margin:0">${id?'Editar':'Novo'} Projeto</div>
      <button class="icon-btn" onclick="closeForm()">✕</button>
    </div>
    <div class="stack">
      <div class="field">
        <label>Nome</label>
        <input class="input" id="f-name" placeholder="Ex: Série Aquarela Urbana" value="${p?.name||''}"/>
      </div>
      <div class="field">
        <label>Descrição (opcional)</label>
        <textarea class="input" id="f-desc" rows="2" placeholder="O que você vai criar?">${p?.description||''}</textarea>
      </div>
      <div class="field">
        <label>Cor</label>
        <div class="swatches" id="swatches">
          ${COLORS.map(c=>`<div class="swatch${color===c?' on':''}" style="background:${c}" data-color="${c}" onclick="pickColor('${c}')">
            ${color===c?'<span style="color:#fff;font-weight:700;font-size:14px">✓</span>':''}
          </div>`).join('')}
        </div>
      </div>
      <div class="row" style="gap:10px;margin-top:8px">
        <button class="btn btn-secondary btn-full" onclick="closeForm()">Cancelar</button>
        <button class="btn btn-primary btn-full" id="f-save" onclick="saveProject()">
          ${id?'Salvar':'Criar projeto'}
        </button>
      </div>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if (e.target===overlay) closeForm(); });
  document.body.appendChild(overlay);
  document.getElementById('f-name').focus();
  window._formColor = color;
};

const pickColor = c => {
  window._formColor = c;
  document.querySelectorAll('.swatch').forEach(s => {
    const isOn = s.dataset.color === c;
    s.classList.toggle('on', isOn);
    s.innerHTML = isOn ? '<span style="color:#fff;font-weight:700;font-size:14px">✓</span>' : '';
  });
};

const closeForm = () => { document.getElementById('proj-modal')?.remove(); };

const saveProject = () => {
  const name = document.getElementById('f-name').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const color = window._formColor || COLORS[0];
  if (!name) { document.getElementById('f-name').focus(); return; }
  if (formEditId) {
    const p = DB.projects.find(x=>x.id===formEditId);
    p.name=name; p.description=desc; p.color=color;
    toast('Projeto atualizado ✓','success');
  } else {
    DB.projects.unshift({ id:Date.now().toString(), name, description:desc, color, createdAt:new Date().toISOString(), completed:false, completedAt:null });
    toast('Projeto criado! 🎨','success');
  }
  save(); closeForm(); render();
};

// ─── BACKUP ─────────────────────────────────────────────
const exportData = () => {
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artlog-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();
};
const importData = async inp => {
  const file = inp.files[0]; if (!file) return;
  if (!confirm('Importar irá substituir todos os dados. Continuar?')) return;
  try {
    const text = await file.text();
    const d = JSON.parse(text);
    if (!d.projects||!d.sessions) throw 0;
    DB = d; save(); toast('Dados importados ✓','success'); render();
  } catch { toast('Arquivo inválido','error'); }
  inp.value='';
};

// ─── SERVICE WORKER ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/artlogi/sw.js', { scope: '/artlogi/' })
    .catch(() => {});
}

// ─── INIT ────────────────────────────────────────────────
render();
</script>
</body>
</html>
